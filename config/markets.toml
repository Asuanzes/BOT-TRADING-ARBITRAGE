# Bot configuration for btcbot.
#
# mode: "simulation" — log signals only, no orders sent.
#       "live"       — submit real orders via Polymarket CLOB.
mode = "simulation"

# Starting cash (USDC) for simulation. Reset to 3000 for fresh stats.
simulated_balance_usdc = 3000.0

# Base entry size. Kelly criterion (computed in main.rs) may scale this up.
# Clamped to [100, 200] unless Kelly demands more (bounded by bankroll fraction).
entry_size_usdc = 150.0

[[markets]]
id                          = "BTC_5M_UPDOWN"
symbol                      = "BTCUSDT"
window_secs                 = 300

# ── Operation mode ─────────────────────────────────────────────────────────
# safe: confidence ≥ 0.30  |  aggressive: ≥ 0.20  |  degen: ≥ 0.10
operation_mode              = "safe"

# ── Timing: snipe T-30s to T-10s ──────────────────────────────────────────
entry_delay_secs            = 0.0    # not used — timing controlled by max_remaining_secs
min_remaining_secs          = 10.0   # don't enter with < 10 s left
max_remaining_secs          = 30.0   # only enter with ≤ 30 s left

# ── Token price limits ─────────────────────────────────────────────────────
min_entry_token_price       = 0.58   # skip coin-flip zone; only enter when market has clear consensus
max_entry_token_price_yes   = 0.88   # allow higher ceiling with scoring system
max_entry_token_price_no    = 0.88

# ── Liquidity / spread ─────────────────────────────────────────────────────
min_liq_multiplier          = 2.0
max_spread                  = 0.15
max_quote_skew              = 0.08

# ── Disabled (replaced by scoring) ────────────────────────────────────────
min_price_diff_usd          = 0.0
min_volume_5m               = 0.0
min_entry_edge              = 0.0
vol_usd_per_sqrts           = 25.0
momentum_reject_usd_per_sec = 0.0
strong_momentum_usd_per_sec = 0.0
min_price_diff_usd_strong   = 0.0
oi_contrarian_pct           = 0.0
fade_extreme_diff_usd       = 0.0
dead_zone_start_secs        = 0.0
dead_zone_end_secs          = 0.0

[risk]
take_profit_pct           = 10.0
stop_loss_pct             = 10.0
trail_arm_pct             = 10.0
trail_giveback_pct        = 0.60
reversal_diff_usd         = 100000.0
let_run_diff_usd          = 0.0
stop_loss_skip_diff_usd   = 0.0
liq_exit_critical         = 0.0
liq_drain_min_pnl_pct     = 0.0
max_spread_exit           = 0.0
spread_skip_if_profit_pct = 0.0
soft_reversion_diff_usd   = 0.0
reversal_hard_diff_usd    = 75.0
stop_confirm_secs         = 30.0
stop_skip_if_diff_usd     = 5.0
stop_min_secs_to_arm      = 10.0
stop_tier_far_dd          = 0.25
stop_tier_mid_dd          = 0.20
stop_tier_near_dd         = 0.15
stop_tier_close_dd        = 0.10
stop_tier_far_secs        = 180.0
stop_tier_mid_secs        = 120.0
stop_tier_close_secs      = 60.0
