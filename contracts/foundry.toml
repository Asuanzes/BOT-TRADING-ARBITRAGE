[profile.default]
src           = "src"
out           = "out"
libs          = ["lib"]
test          = "test"
script        = "script"
solc_version  = "0.8.24"
optimizer     = true
optimizer_runs = 200
via_ir        = false
evm_version   = "paris"
remappings    = [
    "forge-std/=lib/forge-std/src/",
    "@chainlink/=lib/chainlink-brownie-contracts/contracts/",
]

# Etherscan-style verification (Arbiscan for Arbitrum Sepolia).
# Requires ARBISCAN_API_KEY in env at deploy time.
[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }

# RPC endpoints used by `forge script --rpc-url <name>` and `cast --rpc-url <name>`.
# Override with ARBITRUM_SEPOLIA_RPC_URL if needed.
[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL:-https://sepolia-rollup.arbitrum.io/rpc}"

# See https://book.getfoundry.sh/reference/config for a full reference.
